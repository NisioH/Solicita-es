{% extends 'base.html' %}

{% block title %}
    {% if pedido.numero %}Editar Solicitação {{ pedido.numero }}{% else %}Nova Solicitação{% endif %}
{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">
                    <i class="bi bi-file-earmark-text me-2"></i>
                    {% if pedido.numero %}Editar Solicitação{% else %}Nova Solicitação{% endif %}
                </h4>
            </div>
            <div class="card-body">
                <form method="post" action="{% if pedido.numero %}{% url 'pedido_update' pedido.numero %}{% else %}{% url 'pedido_create' %}{% endif %}" novalidate>
                    {% csrf_token %}

                    <input type="hidden" name="page" value="{{ current_page }}">
                    <input type="hidden" name="status_filtro" value="{{ current_status }}">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Número da Solicitação</label>
                            <input type="text" name="numero" class="form-control" 
                                   value="{{ pedido.numero|default:'' }}" 
                                   {% if pedido.numero %}readonly{% endif %} required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Safra</label>
                            <input type="text" name="safra" class="form-control" 
                                   value="{{ pedido.safra|default:'' }}" placeholder="Ex: 2024/2025" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-bold">Descrição</label>
                            <textarea name="descricao" class="form-control" rows="3" required>{{ pedido.descricao|default:'' }}</textarea>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Solicitado por</label>
                            <input type="text" name="solicitado_por" class="form-control" 
                                   value="{{ pedido.solicitado_por|default:'' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Centro de Custo</label>
                            <input type="text" name="centro_custo" class="form-control" 
                                   value="{{ pedido.centro_custo|default:'' }}" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Data da Solicitação</label>
                            <input type="date" name="data" class="form-control" 
                                   value="{{ pedido.data|default:'' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Data de Recebimento</label>
                            <input type="date" name="data_recebido" class="form-control" 
                                   value="{{ pedido.data_recebido|default:'' }}">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Status</label>
                            <select name="status" class="form-select">
                                <option value="Em Aberto" {% if pedido.status == 'Em Aberto' or pedido.status == 'em aberto' or pedido.status == 'Aguardando' %}selected{% endif %}>Em Aberto</option>
                                <option value="Reprovada" {% if pedido.status == 'Reprovada' %}selected{% endif %}>Reprovada</option>
                                <option value="Concluído" {% if pedido.status == 'Concluído' or pedido.status == 'Recebido' %}selected{% endif %}>Concluído</option>
                                <option value="Cancelado" {% if pedido.status == 'Cancelado' or pedido.status == 'Cancelada' %}selected{% endif %}>Cancelado</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Fornecedor</label>
                            <input type="text" name="fornecedor" class="form-control" 
                                   value="{{ pedido.fornecedor|default:'' }}">
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-bold">Nota Fiscal</label>
                            <input type="text" name="nota_fiscal" class="form-control" 
                                   value="{{ pedido.nota_fiscal|default:'' }}">
                        </div>
                    </div>

                    <div class="mt-4 d-flex justify-content-between">
                        <a href="{% url 'pedido_list' %}?page={{ current_page }}&status={{ current_status }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Voltar
                        </a>
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-lg"></i> Salvar Solicitação
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
