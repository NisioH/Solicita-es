<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Controle de Solicitações{% endblock %}</title>

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-bs-theme', savedTheme);
        })();
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
    body { padding-top: 70px; transition: background-color 0.3s ease, color 0.3s ease; }
    .navbar { margin-bottom: 20px; transition: background-color 0.3s ease; }
    .container { margin-top: 20px; }
    .errorlist { color: #dc3545; list-style-type: none; padding: 0; margin-top: 5px; font-size: 0.9em; }
    
    /* --- AJUSTES EXCLUSIVOS PARA MODO DARK --- */
    [data-bs-theme="dark"] body {
        background-color: #121212 !important; /* Fundo geral da página */
        color: #f8f9fa;
    }

    /* Remove o fundo branco de qualquer card ou área de filtros */
    [data-bs-theme="dark"] .card, 
    [data-bs-theme="dark"] .bg-light,
    [data-bs-theme="dark"] .bg-white {
        background-color: #1e1e1e !important;
        color: #f8f9fa !important;
        border-color: #333 !important;
    }

    /* Força a tabela a ficar escura e sem bordas brancas brilhantes */
    [data-bs-theme="dark"] .table {
        color: #f8f9fa !important;
        background-color: transparent !important;
        border-color: #444 !important;
    }

    [data-bs-theme="dark"] .table-striped>tbody>tr:nth-of-type(odd)>* {
        background-color: rgba(255, 255, 255, 0.05) !important; /* Linhas zebradas suaves */
        color: #f8f9fa !important;
    }

    /* Ajusta os inputs (campos de busca) para não ficarem brancos */
    [data-bs-theme="dark"] .form-control,
    [data-bs-theme="dark"] .form-select {
        background-color: #2b2b2b !important;
        border-color: #444 !important;
        color: #fff !important;
    }

    [data-bs-theme="dark"] .form-control::placeholder {
        color: #aaa !important;
    }

        /* Força a transparência no hover de meses e anos no modo dark */
    [data-bs-theme="dark"] .datepicker table tr td span.month:hover,
    [data-bs-theme="dark"] .datepicker table tr td span.year:hover,
    [data-bs-theme="dark"] .datepicker table tr td span.decade:hover {
        background-color: rgba(255, 255, 255, 0.05) !important; /* Quase invisível */
        color: #fff !important;
        border-radius: 4px;
    }

    /* Deixa o item que já está selecionado (Active) mais suave também */
    [data-bs-theme="dark"] .datepicker table tr td span.active,
    [data-bs-theme="dark"] .datepicker table tr td span.active.active {
        background-color: rgba(13, 110, 253, 0.1) !important; /* Azul suave */
        background-image: none !important;
        box-shadow: none !important;
        color: #5c5b5b !important;
    }

    /* Remove qualquer borda ou sombra estranha que o Datepicker coloca por padrão */
    [data-bs-theme="dark"] .datepicker-dropdown {
        border: 1px solid #444 !important;
        box-shadow: 0 5px 10px rgba(0,0,0,0.5) !important;
    }

    /* Ajusta o cabeçalho (setas e título do mês/ano) */
    [data-bs-theme="dark"] .datepicker .datepicker-switch:hover,
    [data-bs-theme="dark"] .datepicker .prev:hover,
    [data-bs-theme="dark"] .datepicker .next:hover,
    [data-bs-theme="dark"] .datepicker tfoot th:hover {
        background-color: rgba(255, 255, 255, 0.1) !important;
    }
</style>

    {% block extra_css %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-datepicker@1.10.0/dist/css/bootstrap-datepicker3.min.css">
    {% endblock %}
</head>
<body>
    <nav id="mainNavbar" class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container-fluid">
            <a class="btn btn-primary fw-bold" href="{% url 'pedido_list' %}">
                Home
            </a>
                      
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse align-items-right" id="navbarNav" style="justify-content: flex-end">
                <div class="d-flex align-items-center">
                    <button id="btnToggleTheme" class="btn btn-sm btn-outline-light d-flex align-items-center px-3 py-1">
                        <i id="iconTheme" class="bi bi-moon-fill me-2"></i>
                        <span id="themeText">Escuro</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock content %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const htmlElement = document.documentElement;
            const btnToggle = document.getElementById('btnToggleTheme');
            const iconTheme = document.getElementById('iconTheme');
            const themeText = document.getElementById('themeText');
            const navbar = document.getElementById('mainNavbar');

            function updateUI(tema) {
                if (tema === 'dark') {
                    iconTheme.classList.replace('bi-moon-fill', 'bi-sun-fill');
                    themeText.innerText = 'Claro';
                    navbar.classList.replace('bg-primary', 'bg-dark');
                    btnToggle.classList.replace('btn-outline-light', 'btn-outline-info');
                } else {
                    iconTheme.classList.replace('bi-sun-fill', 'bi-moon-fill');
                    themeText.innerText = 'Escuro';
                    navbar.classList.replace('bg-dark', 'bg-primary');
                    btnToggle.classList.replace('btn-outline-info', 'btn-outline-light');
                }
            }

            // Inicializa a UI com base no que já foi aplicado no <head>
            updateUI(htmlElement.getAttribute('data-bs-theme'));

            btnToggle.addEventListener('click', function () {
                const currentTheme = htmlElement.getAttribute('data-bs-theme');
                const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
                
                htmlElement.setAttribute('data-bs-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateUI(newTheme);
            });
        });
    </script>

    {% block extra_js %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-datepicker@1.10.0/dist/js/bootstrap-datepicker.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap-datepicker@1.10.0/dist/locales/bootstrap-datepicker.pt-BR.min.js"></script>

    <script>
        $(document).ready(function () {
            $('#mesAno').datepicker({
                format: "mm/yyyy",
                startView: "years",
                minViewMode: "months",
                autoclose: true,
                language: "pt-BR"
            });

            $('form').on('submit', function (e) {
                const valor = $('#mesAno').val();
                if (valor && valor.includes('/')) {
                    const [mes, ano] = valor.split('/');
                    $('<input>').attr({type: 'hidden', name: 'mes', value: mes}).appendTo(this);
                    $('<input>').attr({type: 'hidden', name: 'ano', value: ano}).appendTo(this);
                }
            });
        });
    </script>
    {% endblock %}
</body>
</html>
